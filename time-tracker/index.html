<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillClock — Time Tracker</title>
<style>
  :root{
    --canvas:#f4f5f7; --panel:#ffffff; --panel-2:#fafbfc;
    --line:#e3e6eb; --line-2:#d4d9e0;
    --ink:#1a2330; --body:#3b4658; --muted:#6b7688; --faint:#9aa3b2;
    --navy:#152c4e; --navy-700:#1d3a63; --navy-50:#eef2f8;
    --accent:#3a6ea5;            /* refined corporate blue */
    --teal:#1f6f6b; --teal-50:#e9f3f2;
    --green:#2f8f6b; --amber:#9a6b1e; --amber-50:#f6efe2;
    --red:#9b2c34; --red-50:#f6e9ea;
    --radius:10px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(16,24,40,.05), 0 1px 3px rgba(16,24,40,.08);
    --serif:Georgia,"Times New Roman","Iowan Old Style",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--body);background:var(--canvas);
    min-height:100vh;padding:40px 24px 64px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:880px;margin:0 auto}

  /* Header */
  header{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:18px;
    padding-bottom:20px;margin-bottom:26px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:44px;height:44px;border-radius:8px;background:var(--navy);
    display:flex;align-items:center;justify-content:center}
  .logo svg{width:22px;height:22px}
  h1{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:-.2px;color:var(--ink)}
  .sub{font-size:12px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1.1px;font-weight:500}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap}

  /* Buttons */
  button{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;
    border-radius:var(--radius-sm);padding:9px 15px;color:#fff;display:inline-flex;align-items:center;gap:7px;
    transition:background .14s ease, border-color .14s ease, color .14s ease}
  button:active{transform:translateY(.5px)}
  .btn-start{background:var(--navy);border-color:var(--navy)}
  .btn-start:hover{background:var(--navy-700)}
  .btn-stop{background:#fff;color:var(--navy);border-color:var(--line-2)}
  .btn-stop:hover{background:var(--navy-50);border-color:var(--navy-700)}
  .btn-accent{background:var(--navy);border-color:var(--navy)}
  .btn-accent:hover{background:var(--navy-700)}
  .btn-ghost{background:#fff;color:var(--body);border-color:var(--line-2)}
  .btn-ghost:hover{background:var(--panel-2);border-color:var(--muted);color:var(--ink)}
  .btn-conclude{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn-conclude:hover{background:#185955}
  .btn-danger-ghost{background:#fff;color:var(--red);border-color:#e6ccce}
  .btn-danger-ghost:hover{background:var(--red-50);border-color:var(--red)}

  /* Summary */
  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.1px;font-weight:600}
  .stat .v{font-size:30px;font-weight:680;margin-top:9px;color:var(--ink);
    font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .stat .v small{font-size:14px;color:var(--muted);font-weight:500;margin-left:4px}
  .stat.hl{background:var(--navy);border-color:var(--navy)}
  .stat.hl .k{color:#9fb3d1}
  .stat.hl .v{color:#fff}
  .stat.hl .v small{color:#a9bcd8}

  /* Add row */
  .add-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:26px;display:flex;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .add-card input{flex:1;min-width:180px;background:#fff;border:1px solid var(--line-2);
    border-radius:var(--radius-sm);color:var(--ink);padding:11px 14px;font-size:14px;font-family:inherit}
  .add-card input::placeholder{color:var(--faint)}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,110,165,.15)}

  /* Timer list */
  .timers{display:flex;flex-direction:column;gap:14px}
  .timer{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line-2);
    border-radius:var(--radius);
    padding:18px 22px;display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:20px;
    box-shadow:var(--shadow);transition:border-color .2s, box-shadow .2s, opacity .2s}
  .timer.running{border-left-color:var(--green)}
  .timer.concluded{border-left-color:var(--teal);background:var(--panel-2)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:.2s}
  .timer.running .dot{background:var(--green);box-shadow:0 0 0 3px rgba(47,143,107,.18);animation:pulse 1.6s infinite}
  .timer.concluded .dot{background:var(--teal)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(47,143,107,.18)}50%{box-shadow:0 0 0 6px rgba(47,143,107,.04)}}
  .t-name{font-size:16px;font-weight:650;letter-spacing:-.1px;color:var(--ink)}
  .t-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:3px 9px;border-radius:5px;letter-spacing:.2px;border:1px solid transparent}
  .badge.bill{background:var(--teal-50);color:var(--teal);border-color:#cfe5e3}
  .badge.round{background:var(--navy-50);color:var(--navy-700);border-color:#d8e2f0}
  .t-time{font-size:28px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.5px;text-align:right;
    color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .timer.concluded .t-time{color:var(--muted)}
  .t-actions{display:flex;gap:8px;align-items:center}
  .icon-btn{background:transparent;color:var(--faint);padding:8px;font-size:14px;line-height:1;
    border:1px solid transparent;border-radius:6px}
  .icon-btn:hover{color:var(--red);background:var(--red-50)}

  /* Edit-time modal */
  .modal-bg{position:fixed;inset:0;background:rgba(26,35,48,.4);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px;width:100%;max-width:380px;box-shadow:0 20px 48px rgba(16,24,40,.22)}
  .modal h3{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:5px;color:var(--ink)}
  .modal .msub{font-size:12px;color:var(--muted);margin-bottom:20px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}
  .modal-row{display:flex;gap:12px;margin-bottom:22px}
  .modal-row label{flex:1;font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600}
  .modal-row input{width:100%;margin-top:8px;background:#fff;border:1px solid var(--line-2);
    border-radius:var(--radius-sm);color:var(--ink);padding:12px 14px;font-size:18px;font-weight:600;
    font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}

  .empty{text-align:center;color:var(--muted);padding:64px 20px;font-size:14px;
    background:var(--panel);border:1px dashed var(--line-2);border-radius:var(--radius)}
  .empty .big{font-size:30px;margin-bottom:12px;opacity:.5}

  footer{margin-top:32px;padding-top:20px;border-top:1px solid var(--line);
    text-align:center;color:var(--faint);font-size:12px}

  @media(max-width:680px){
    body{padding:28px 16px 48px}
    .timer{grid-template-columns:auto 1fr;row-gap:14px}
    .t-time{grid-column:2;text-align:left;font-size:25px}
    .t-actions{grid-column:1/-1;flex-wrap:wrap}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="toolbar">
      <button class="btn-ghost" onclick="exportCSV()">⤓ Export</button>
      <button class="btn-danger-ghost" onclick="clearAll()">Clear all</button>
    </div>
  </header>

  <div class="summary">
    <div class="stat"><div class="k">Time tracked</div><div class="v" id="sumTime">0:00:00</div></div>
    <div class="stat hl"><div class="k">Billable hours</div><div class="v" id="sumHours">0<small>hrs</small></div></div>
  </div>

  <div class="add-card">
    <input id="newName" placeholder="Company / client name…" onkeydown="if(event.key==='Enter')addTimer()">
    <button class="btn-accent" onclick="addTimer()">+ Add company</button>
  </div>

  <div class="timers" id="timers"></div>

  <footer>Saved in your browser · Timers keep running even if you close the tab · Conclude rounds up to the next whole hour</footer>
</div>

<div class="modal-bg" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3>Edit time</h3>
    <div class="msub" id="editName"></div>
    <div class="modal-row">
      <label>Hours<input id="editH" type="number" min="0" inputmode="numeric" onkeydown="if(event.key==='Enter')saveEdit()"></label>
      <label>Minutes<input id="editM" type="number" min="0" max="59" inputmode="numeric" onkeydown="if(event.key==='Enter')saveEdit()"></label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEdit()">Cancel</button>
      <button class="btn-accent" onclick="saveEdit()">Save time</button>
    </div>
  </div>
</div>

<script>
const KEY = 'billclock.v2';
let timers = load();

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(timers)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function addTimer(){
  const el = document.getElementById('newName');
  const name = el.value.trim();
  if(!name){ el.focus(); return; }
  timers.push({ id: uid(), name, elapsed: 0, startedAt: null, concluded: false, billedHours: 0 });
  el.value = '';
  save(); render();
}

function toggle(id){
  const t = timers.find(x=>x.id===id); if(!t || t.concluded) return;
  if(t.startedAt){ t.elapsed += Date.now() - t.startedAt; t.startedAt = null; }
  else { t.startedAt = Date.now(); }
  save(); render();
}


// Conclude: stop the timer and lock the time rounded UP to the next whole hour.
function conclude(id){
  const t = timers.find(x=>x.id===id); if(!t) return;
  if(t.startedAt){ t.elapsed += Date.now() - t.startedAt; t.startedAt = null; }
  t.billedHours = billableHours(t);
  t.concluded = true;
  save(); render();
}
function reopen(id){
  const t = timers.find(x=>x.id===id); if(!t) return;
  t.concluded = false; t.billedHours = 0;
  save(); render();
}

function delTimer(id){
  const t = timers.find(x=>x.id===id);
  if(t && !confirm('Delete "'+t.name+'"?')) return;
  timers = timers.filter(x=>x.id!==id);
  save(); render();
}
function clearAll(){
  if(timers.length === 0) return;
  if(!confirm('Clear ALL companies and their tracked time?\nThis cannot be undone.')) return;
  timers = []; lastHours = -1;
  save(); render();
}

// ---- Edit time modal ----
let editId = null;
function openEdit(id){
  const t = timers.find(x=>x.id===id); if(!t || t.concluded) return;
  editId = id;
  const ms = currentMs(t);
  document.getElementById('editName').textContent = t.name;
  document.getElementById('editH').value = Math.floor(ms/3600000);
  document.getElementById('editM').value = Math.floor((ms%3600000)/60000);
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('editH').select(), 0);
}
function closeEdit(){ editId = null; document.getElementById('editModal').classList.remove('open'); }
function saveEdit(){
  const t = timers.find(x=>x.id===editId); if(!t){ closeEdit(); return; }
  const h = Math.max(0, parseInt(document.getElementById('editH').value, 10) || 0);
  const m = Math.max(0, Math.min(59, parseInt(document.getElementById('editM').value, 10) || 0));
  t.elapsed = (h*3600 + m*60) * 1000;
  if(t.startedAt) t.startedAt = Date.now();  // keep a running timer counting from the new base
  save(); render(); closeEdit();
}

function currentMs(t){ return t.elapsed + (t.startedAt ? Date.now() - t.startedAt : 0); }
function billableHours(t){ const ms = currentMs(t); return ms > 0 ? Math.ceil(ms/3600000) : 0; }
function fmt(ms){
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function esc(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  const box = document.getElementById('timers');
  if(timers.length === 0){
    box.innerHTML = '<div class="empty">No companies yet — add a client above to begin tracking billable time.</div>';
  } else {
    box.innerHTML = timers.map(t=>{
      const running = !!t.startedAt;
      const rounds = billableHours(t);
      let meta;
      if(t.concluded){
        meta = `<span class="badge bill">✓ Billed ${t.billedHours} ${t.billedHours===1?'hr':'hrs'}</span>`;
      } else if(rounds > 0){
        meta = `<span class="badge round">rounds to ${rounds} ${rounds===1?'hr':'hrs'}</span>`;
      } else {
        meta = `<span style="color:var(--faint)">not started</span>`;
      }
      let actions;
      if(t.concluded){
        actions = `<button class="btn-ghost" onclick="reopen('${t.id}')">↺ Reopen</button>`;
      } else {
        const paused = !running && t.elapsed > 0;
        const lbl = running ? '⏸ Pause' : (paused ? '▶ Resume' : '▶ Start');
        const cls = running ? 'btn-stop' : 'btn-start';
        actions = `<button class="${cls}" onclick="toggle('${t.id}')">${lbl}</button>
           <button class="btn-ghost" onclick="openEdit('${t.id}')">✎ Edit time</button>
           <button class="btn-conclude" onclick="conclude('${t.id}')">✓ Conclude</button>`;
      }
      return `<div class="timer ${running?'running':''} ${t.concluded?'concluded':''}">
        <div class="dot"></div>
        <div>
          <div class="t-name">${esc(t.name)}</div>
          <div class="t-meta">${meta}</div>
        </div>
        <div class="t-time" data-time="${t.id}">${fmt(currentMs(t))}</div>
        <div class="t-actions">
          ${actions}
          <button class="icon-btn" title="Delete" onclick="delTimer('${t.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }
  updateSummary();
}

function tick(){
  let dirty = false;
  timers.forEach(t=>{
    if(!t.startedAt) return;
    dirty = true;
    const te = document.querySelector(`[data-time="${t.id}"]`);
    if(te) te.textContent = fmt(currentMs(t));
  });
  if(dirty) updateSummary();
}

let lastHours = -1;
function updateSummary(){
  let totalMs = 0, totalHours = 0;
  timers.forEach(t=>{ totalMs += currentMs(t); totalHours += billableHours(t); });
  document.getElementById('sumTime').textContent = fmt(totalMs);
  // only touch innerHTML when value changes (avoids reflow churn each tick)
  if(totalHours !== lastHours){ document.getElementById('sumHours').innerHTML = totalHours + '<small>hrs</small>'; lastHours = totalHours; }
}

function exportCSV(){
  const rows = [['Company','Time tracked','Billable hours','Status']];
  timers.forEach(t=>{
    const hrs = t.concluded ? t.billedHours : billableHours(t);
    rows.push([t.name, fmt(currentMs(t)), hrs, t.concluded ? 'Concluded' : (t.startedAt ? 'Running' : 'Paused')]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'billclock-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

render();
setInterval(tick, 1000);
</script>
</body>
</html>
